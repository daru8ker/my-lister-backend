services:
  - type: web
    name: teian-kun-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SPREADSHEET_ID
        sync: false
      - key: SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
